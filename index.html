<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漢字 N5 — Belajar Kanji Jepang</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --card: #16161f;
    --card2: #1e1e2a;
    --border: rgba(255,255,255,0.07);
    --accent: #e8363b;
    --accent2: #ff6b35;
    --gold: #f5c842;
    --teal: #3dd6c8;
    --purple: #9b7ff0;
    --text: #f0f0f5;
    --text2: #9090aa;
    --text3: #5a5a70;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG noise */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* ─── HEADER ─── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }
  .header-inner {
    max-width: 1100px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Noto Serif JP', serif;
    font-weight: 900; font-size: 22px;
    color: var(--text);
    text-decoration: none;
  }
  .logo span.kanji { color: var(--accent); }
  .logo span.badge {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 11px; font-weight: 600;
    background: var(--accent);
    color: white; padding: 2px 7px;
    border-radius: 99px; margin-left: 4px;
    vertical-align: middle;
  }
  nav { display: flex; gap: 4px; }
  nav button {
    background: none; border: none; cursor: pointer;
    color: var(--text2); padding: 6px 14px;
    border-radius: 8px; font-size: 13px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 500; transition: all .2s;
  }
  nav button:hover { color: var(--text); background: var(--bg3); }
  nav button.active { color: var(--text); background: var(--card2); }

  /* ─── HERO ─── */
  .hero {
    position: relative; overflow: hidden;
    padding: 60px 24px 50px;
    text-align: center;
  }
  .hero-glow {
    position: absolute;
    top: -60px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(232,54,59,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(48px, 10vw, 90px);
    font-weight: 900;
    color: var(--text);
    line-height: 1;
    margin-bottom: 12px;
    letter-spacing: -2px;
  }
  .hero h1 .red { color: var(--accent); }
  .hero p {
    color: var(--text2); font-size: 15px;
    max-width: 480px; margin: 0 auto 28px;
    line-height: 1.7;
  }
  .hero-stats {
    display: flex; justify-content: center; gap: 32px;
    flex-wrap: wrap;
  }
  .stat { text-align: center; }
  .stat .num {
    font-size: 28px; font-weight: 700;
    font-family: 'Noto Serif JP', serif;
    color: var(--text);
  }
  .stat .lbl { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* ─── TABS ─── */
  .tabs-container {
    max-width: 1100px; margin: 0 auto;
    padding: 0 24px 60px;
  }
  .section-tabs {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .tab-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text2); padding: 8px 18px;
    border-radius: 99px; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .2s;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .tab-btn:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }
  .tab-btn.active {
    background: var(--accent); border-color: var(--accent);
    color: white;
  }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ─── KANJI GRID ─── */
  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 2px;
    color: var(--text3); text-transform: uppercase; margin-bottom: 16px;
  }
  .category-group { margin-bottom: 40px; }
  .category-title {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; font-weight: 600; color: var(--text2);
    margin-bottom: 14px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .category-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .kanji-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 10px;
  }
  .kanji-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 12px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .kanji-card::before {
    content: ''; position: absolute;
    inset: 0; opacity: 0;
    background: linear-gradient(135deg, rgba(232,54,59,0.08), transparent);
    transition: opacity .2s;
  }
  .kanji-card:hover { border-color: rgba(232,54,59,0.4); transform: translateY(-2px); }
  .kanji-card:hover::before { opacity: 1; }
  .kanji-char {
    font-family: 'Noto Serif JP', serif;
    font-size: 38px; font-weight: 700;
    color: var(--text); line-height: 1;
    margin-bottom: 8px;
  }
  .kanji-reading {
    font-size: 11px; color: var(--accent);
    font-weight: 600; margin-bottom: 3px;
  }
  .kanji-meaning {
    font-size: 11px; color: var(--text3); line-height: 1.4;
  }
  .kanji-strokes {
    position: absolute; top: 8px; right: 8px;
    font-size: 10px; color: var(--text3);
    background: var(--bg3); padding: 2px 5px;
    border-radius: 4px;
  }

  /* ─── MODAL ─── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    width: 100%; max-width: 480px;
    padding: 32px;
    transform: scale(0.95) translateY(10px);
    transition: transform .25s;
    position: relative;
  }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }
  .modal-close {
    position: absolute; top: 16px; right: 16px;
    background: var(--bg3); border: none; cursor: pointer;
    color: var(--text2); width: 32px; height: 32px;
    border-radius: 8px; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
  }
  .modal-close:hover { color: var(--text); background: var(--card2); }
  .modal-kanji-big {
    font-family: 'Noto Serif JP', serif;
    font-size: 80px; font-weight: 900;
    text-align: center; line-height: 1;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--text) 0%, var(--text2) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .modal-meaning { text-align: center; font-size: 22px; font-weight: 600; margin-bottom: 20px; }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .modal-cell {
    background: var(--bg3); border-radius: 12px; padding: 12px 14px;
  }
  .modal-cell .lbl { font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .modal-cell .val { font-size: 14px; color: var(--text); font-weight: 500; }
  .modal-cell .val.jp { font-family: 'Noto Sans JP', sans-serif; font-size: 16px; }
  .examples-list { display: flex; flex-direction: column; gap: 8px; }
  .example-item {
    background: var(--bg3); border-radius: 10px; padding: 10px 14px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .example-item .word {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 18px; font-weight: 500; color: var(--text);
  }
  .example-item .info { text-align: right; }
  .example-item .reading { font-size: 12px; color: var(--accent); }
  .example-item .meaning { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .stroke-order-note {
    text-align: center; font-size: 12px; color: var(--text3);
    margin-top: 12px; padding: 10px;
    background: var(--bg3); border-radius: 10px;
    line-height: 1.6;
  }

  /* ─── KUIS ─── */
  .quiz-container { max-width: 600px; margin: 0 auto; }
  .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .quiz-progress { font-size: 13px; color: var(--text2); }
  .quiz-score {
    font-size: 13px; font-weight: 600;
    color: var(--teal);
  }
  .progress-bar-wrap {
    height: 4px; background: var(--bg3); border-radius: 99px;
    margin-bottom: 28px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px; transition: width .4s ease;
  }
  .quiz-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 36px 28px;
    text-align: center; margin-bottom: 20px;
  }
  .quiz-question-kanji {
    font-family: 'Noto Serif JP', serif;
    font-size: 72px; font-weight: 900;
    margin-bottom: 14px; line-height: 1;
    color: var(--text);
  }
  .quiz-question-type { font-size: 13px; color: var(--text3); margin-bottom: 6px; }
  .quiz-question-text { font-size: 16px; color: var(--text2); }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .quiz-option {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    cursor: pointer; transition: all .2s; text-align: left;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px; font-weight: 500; color: var(--text);
  }
  .quiz-option:hover:not(:disabled) { border-color: rgba(232,54,59,0.4); background: var(--card2); }
  .quiz-option.correct { border-color: var(--teal)!important; background: rgba(61,214,200,0.08)!important; color: var(--teal)!important; }
  .quiz-option.wrong { border-color: var(--accent)!important; background: rgba(232,54,59,0.08)!important; color: var(--accent)!important; }
  .quiz-option:disabled { cursor: default; }
  .quiz-feedback {
    font-size: 14px; text-align: center; padding: 12px;
    border-radius: 10px; margin-bottom: 16px;
    display: none;
  }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.ok { background: rgba(61,214,200,0.1); color: var(--teal); }
  .quiz-feedback.fail { background: rgba(232,54,59,0.1); color: var(--accent); }
  .btn-next {
    background: var(--accent); color: white; border: none;
    border-radius: 12px; padding: 12px 28px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
    transition: all .2s; display: none; margin: 0 auto;
  }
  .btn-next:hover { background: #c92d32; }
  .btn-next.show { display: block; }
  .quiz-done {
    text-align: center; padding: 40px 20px; display: none;
  }
  .quiz-done.show { display: block; }
  .quiz-done-score {
    font-family: 'Noto Serif JP', serif;
    font-size: 72px; font-weight: 900;
    color: var(--gold); line-height: 1; margin-bottom: 12px;
  }
  .quiz-done h3 { font-size: 22px; margin-bottom: 8px; }
  .quiz-done p { color: var(--text2); font-size: 14px; margin-bottom: 24px; }
  .btn-restart {
    background: var(--card2); color: var(--text); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 28px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
    transition: all .2s; margin-top: 12px;
  }
  .btn-restart:hover { background: var(--bg3); }

  /* ─── PENULISAN ─── */
  .writing-section { max-width: 700px; margin: 0 auto; }
  .stroke-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .stroke-header h2 { font-size: 18px; font-weight: 600; }
  .stroke-selector { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .stroke-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text2); padding: 6px 14px;
    border-radius: 8px; font-size: 13px; cursor: pointer;
    font-family: 'Noto Serif JP', serif; font-size: 18px;
    transition: all .2s;
  }
  .stroke-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .stroke-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(245,200,66,0.08); }
  .stroke-display {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 28px;
    text-align: center;
  }
  .stroke-big-kanji {
    font-family: 'Noto Serif JP', serif;
    font-size: 100px; font-weight: 900; line-height: 1;
    margin-bottom: 16px;
    background: linear-gradient(135deg, var(--gold), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .stroke-info-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
  .stroke-info-chip {
    background: var(--bg3); border-radius: 99px;
    padding: 6px 14px; font-size: 12px; color: var(--text2);
    display: flex; align-items: center; gap: 6px;
  }
  .stroke-info-chip strong { color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; }
  .stroke-steps {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 10px; margin-top: 20px;
    text-align: left;
  }
  .stroke-step {
    background: var(--bg3); border-radius: 12px; padding: 12px;
    border-left: 3px solid var(--border);
  }
  .stroke-step.highlight { border-left-color: var(--gold); }
  .stroke-step .step-num {
    font-size: 10px; font-weight: 700; color: var(--text3);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;
  }
  .stroke-step .step-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }
  .canvas-area { margin: 20px 0; }
  canvas#practiceCanvas {
    border: 2px dashed var(--border);
    border-radius: 16px;
    background: var(--bg3);
    cursor: crosshair;
    display: block; margin: 0 auto;
    touch-action: none;
  }
  .canvas-controls { display: flex; justify-content: center; gap: 10px; margin-top: 12px; }
  .btn-clear {
    background: var(--card2); border: 1px solid var(--border);
    color: var(--text2); padding: 8px 18px;
    border-radius: 8px; font-size: 13px; cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
    transition: all .2s;
  }
  .btn-clear:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

  /* ─── VOCAB ─── */
  .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; }
  .vocab-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px 18px;
    transition: all .2s;
  }
  .vocab-card:hover { border-color: rgba(155,127,240,0.4); transform: translateY(-2px); }
  .vocab-word {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 22px; font-weight: 700; color: var(--text);
    margin-bottom: 4px;
  }
  .vocab-reading { font-size: 13px; color: var(--purple); font-weight: 600; margin-bottom: 4px; }
  .vocab-meaning { font-size: 13px; color: var(--text2); }
  .vocab-kanji-tag {
    display: inline-block; margin-top: 8px;
    background: rgba(155,127,240,0.1); border: 1px solid rgba(155,127,240,0.2);
    color: var(--purple); font-size: 11px; padding: 2px 8px;
    border-radius: 99px; font-weight: 600;
  }

  /* ─── PROGRESS ─── */
  .progress-section { max-width: 700px; margin: 0 auto; }
  .progress-overview {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px; margin-bottom: 32px;
  }
  .progress-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px;
  }
  .progress-card .p-val {
    font-size: 36px; font-weight: 700;
    font-family: 'Noto Serif JP', serif;
    margin-bottom: 4px;
  }
  .progress-card .p-lbl { font-size: 12px; color: var(--text3); }
  .kanji-mastery { display: flex; flex-direction: column; gap: 8px; }
  .mastery-row {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px;
  }
  .mastery-kanji { font-family: 'Noto Serif JP', serif; font-size: 24px; font-weight: 700; min-width: 36px; }
  .mastery-bar-wrap { flex: 1; height: 6px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
  .mastery-bar { height: 100%; border-radius: 99px; }
  .mastery-label { font-size: 11px; color: var(--text3); min-width: 60px; text-align: right; }

  @media (max-width: 600px) {
    .quiz-options { grid-template-columns: 1fr; }
    .hero h1 { font-size: 56px; }
    .kanji-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
    nav button span { display: none; }
  }
  
  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 99px; }

  .chip-tag {
    display: inline-block;
    padding: 3px 8px; border-radius: 99px;
    font-size: 10px; font-weight: 700; margin-right: 4px;
    letter-spacing: 0.5px;
  }
  .chip-red { background: rgba(232,54,59,0.15); color: var(--accent); }
  .chip-gold { background: rgba(245,200,66,0.12); color: var(--gold); }
  .chip-teal { background: rgba(61,214,200,0.12); color: var(--teal); }
  .chip-purple { background: rgba(155,127,240,0.12); color: var(--purple); }
  
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text3); font-size: 15px;
  }
  .empty-state .big { font-family: 'Noto Serif JP', serif; font-size: 48px; margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="#">
      <span class="kanji">漢字</span>
      <span style="color:var(--text2); font-family:'Plus Jakarta Sans',sans-serif; font-size:16px; font-weight:500;">Kanji</span>
      <span class="badge">N5</span>
    </a>
    <nav>
      <button class="active" onclick="showTab('daftar')">📖 <span>Daftar</span></button>
      <button onclick="showTab('penulisan')">✏️ <span>Penulisan</span></button>
      <button onclick="showTab('kosakata')">💬 <span>Kosakata</span></button>
      <button onclick="showTab('kuis')">🎯 <span>Kuis</span></button>
    </nav>
  </div>
</header>

<div class="hero">
  <div class="hero-glow"></div>
  <h1><span class="red">漢字</span> N5</h1>
  <p>Pelajari 80 kanji dasar JLPT N5 — mulai dari cara baca, arti, hingga urutan penulisan stroke.</p>
  <div class="hero-stats">
    <div class="stat"><div class="num">80</div><div class="lbl">Total Kanji</div></div>
    <div class="stat"><div class="num">13</div><div class="lbl">Kategori</div></div>
    <div class="stat"><div class="num">200+</div><div class="lbl">Kosakata</div></div>
    <div class="stat"><div class="num">N5</div><div class="lbl">Level JLPT</div></div>
  </div>
</div>

<div class="tabs-container">

  <!-- ─── DAFTAR ─── -->
  <div class="tab-content active" id="tab-daftar">
    <div id="kanji-list"></div>
  </div>

  <!-- ─── PENULISAN ─── -->
  <div class="tab-content" id="tab-penulisan">
    <div class="writing-section">
      <div class="stroke-header">
        <div>
          <h2>Urutan Penulisan Stroke</h2>

// ─── RENDER KANJI LIST ───────────────────────────────────────────────
function renderKanjiList() {
  const cats = [...new Set(kanjiData.map(k=>k.cat))];
  const colors = { Angka:'var(--accent)', Waktu:'var(--gold)', Alam:'var(--teal)',
    Posisi:'var(--purple)', Manusia:'#ff6b35', Tempat:'#3b82f6',
    Bahasa:'#ec4899', Ukuran:'#84cc16', Sifat:'#f97316', Kegiatan:'#06b6d4', Benda:'#a78bfa' };
  
  const container = document.getElementById('kanji-list');
  let html = '';
  cats.forEach(cat => {
    const items = kanjiData.filter(k=>k.cat===cat);
    const col = colors[cat] || 'var(--text2)';
    html += `<div class="category-group">
      <div class="category-title">
        <span class="category-dot" style="background:${col}"></span>
        <span>${cat}</span>
        <span style="color:var(--text3); font-weight:400">(${items.length} kanji)</span>
      </div>
      <div class="kanji-grid">
        ${items.map(k=>`
          <div class="kanji-card" onclick="openModal('${k.char}')">
            <span class="kanji-strokes">${k.strokes}画</span>
            <div class="kanji-char">${k.char}</div>
            <div class="kanji-reading">${k.on}</div>
            <div class="kanji-meaning">${k.meaning}</div>
          </div>`).join('')}
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

// ─── MODAL ───────────────────────────────────────────────────────────
function openModal(char) {
  const k = kanjiData.find(x=>x.char===char);
  if (!k) return;
  const content = document.getElementById('modal-content');
  content.innerHTML = `
    <div class="modal-kanji-big">${k.char}</div>
    <div class="modal-meaning">${k.meaning}</div>
    <div class="modal-grid">
      <div class="modal-cell"><div class="lbl">ON-YOMI</div><div class="val jp">${k.on}</div></div>
      <div class="modal-cell"><div class="lbl">KUN-YOMI</div><div class="val jp">${k.kun}</div></div>
      <div class="modal-cell"><div class="lbl">STROKE</div><div class="val">${k.strokes} stroke</div></div>
      <div class="modal-cell"><div class="lbl">KATEGORI</div><div class="val">${k.cat}</div></div>
    </div>
    <div class="section-label" style="margin-bottom:10px">Contoh Kata</div>
    <div class="examples-list">
      ${k.examples.map(e=>`<div class="example-item">
        <div class="word">${e.w}</div>
        <div class="info"><div class="reading">${e.r}</div><div class="meaning">${e.m}</div></div>
      </div>`).join('')}
    </div>
    <div class="stroke-order-note">
      ✏️ <strong>Urutan Penulisan</strong>: Kanji ditulis mengikuti aturan "atas ke bawah, kiri ke kanan".<br>
      Buka tab <strong>Penulisan</strong> untuk latihan stroke order detail.
    </div>
  `;
  document.getElementById('modal').classList.add('open');
}
function closeModal(e) { if(e.target.id==='modal') closeModalBtn(); }
function closeModalBtn() { document.getElementById('modal').classList.remove('open'); }

// ─── STROKE / PENULISAN ──────────────────────────────────────────────
let activeStrokeKanji = kanjiData[0].char;

function renderStrokeSection() {
  const sel = document.getElementById('stroke-selector');
  const subset = kanjiData.slice(0, 30);
  sel.innerHTML = subset.map(k=>`
    <button class="stroke-btn ${k.char===activeStrokeKanji?'active':''}" onclick="selectStrokeKanji('${k.char}')">${k.char}</button>
  `).join('');
  renderStrokeDisplay();
}

function selectStrokeKanji(char) {
  activeStrokeKanji = char;
  document.querySelectorAll('.stroke-btn').forEach(b=>{
    b.classList.toggle('active', b.textContent===char);
  });
  renderStrokeDisplay();
  clearCanvas();
}

function renderStrokeDisplay() {
  const k = kanjiData.find(x=>x.char===activeStrokeKanji);
  if (!k) return;
  const guide = strokeGuides[k.char];
  const steps = guide ? guide.steps : ['Ikuti aturan umum: atas→bawah, kiri→kanan'];
  
  document.getElementById('stroke-display').innerHTML = `
    <div class="stroke-big-kanji">${k.char}</div>
    <div class="stroke-info-row">
      <div class="stroke-info-chip">Stroke: <strong>${k.strokes}画</strong></div>
      <div class="stroke-info-chip">On: <strong>${k.on}</strong></div>
      <div class="stroke-info-chip">Kun: <strong>${k.kun}</strong></div>
      <div class="stroke-info-chip">Arti: <strong>${k.meaning}</strong></div>
    </div>
    <div class="section-label" style="text-align:left; margin-top:16px; margin-bottom:12px">Panduan Urutan Stroke</div>
    <div class="stroke-steps">
      ${steps.map((s,i)=>`<div class="stroke-step ${i===0?'highlight':''}">
        <div class="step-num">Stroke ${i+1}</div>
        <div class="step-desc">${s}</div>
      </div>`).join('')}
    </div>
    <div style="margin-top:14px; padding:10px; background:var(--bg3); border-radius:10px; font-size:12px; color:var(--text3); line-height:1.6">
      💡 <strong>Aturan Umum Penulisan Kanji:</strong><br>
      1. Atas sebelum bawah &nbsp;|&nbsp; 2. Kiri sebelum kanan &nbsp;|&nbsp; 3. Horizontal sebelum vertikal<br>
      4. Garis diagonal kiri dahulu &nbsp;|&nbsp; 5. Pusat sebelum sisi &nbsp;|&nbsp; 6. Tutup bingkai terakhir
    </div>
  `;
}

// ─── CANVAS DRAWING ──────────────────────────────────────────────────
let drawing = false, lastX = 0, lastY = 0;
const canvas = document.getElementById('practiceCanvas');
const ctx = canvas ? canvas.getContext('2d') : null;

function initCanvas() {
  if (!ctx) return;
  ctx.strokeStyle = '#f0f0f5';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  // Grid
  drawGrid();
  
  canvas.addEventListener('mousedown', e=>{ drawing=true; [lastX,lastY]=getPos(e); });
  canvas.addEventListener('mousemove', e=>{ if(!drawing)return; const [x,y]=getPos(e); ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(x,y); ctx.stroke(); [lastX,lastY]=[x,y]; });
  canvas.addEventListener('mouseup', ()=>drawing=false);
  canvas.addEventListener('mouseleave', ()=>drawing=false);
  canvas.addEventListener('touchstart', e=>{ e.preventDefault(); drawing=true; [lastX,lastY]=getPosTouch(e); });
  canvas.addEventListener('touchmove', e=>{ e.preventDefault(); if(!drawing)return; const [x,y]=getPosTouch(e); ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(x,y); ctx.stroke(); [lastX,lastY]=[x,y]; });
  canvas.addEventListener('touchend', ()=>drawing=false);
}

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  return [e.clientX-r.left, e.clientY-r.top];
}
function getPosTouch(e) {
  const r = canvas.getBoundingClientRect();
  const t = e.touches[0];
  return [t.clientX-r.left, t.clientY-r.top];
}
function drawGrid() {
  ctx.clearRect(0,0,260,260);
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let i=1;i<4;i++) {
    ctx.beginPath(); ctx.moveTo(i*65,0); ctx.lineTo(i*65,260); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*65); ctx.lineTo(260,i*65); ctx.stroke();
  }
  // Center cross
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(130,0); ctx.lineTo(130,260); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,130); ctx.lineTo(260,130); ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeStyle = '#f0f0f5';
  ctx.lineWidth = 3;
}
function clearCanvas() { drawGrid(); }
function showGuide() {
  const k = kanjiData.find(x=>x.char===activeStrokeKanji);
  if (!k) return;
  clearCanvas();
  ctx.font = `bold 160px 'Noto Serif JP', serif`;
  ctx.fillStyle = 'rgba(245,200,66,0.12)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(k.char, 130, 140);
}

// ─── KOSAKATA ────────────────────────────────────────────────────────
function renderVocab() {
  const allVocab = [];
  kanjiData.forEach(k => k.examples.forEach(e => allVocab.push({...e, k:k.char})));
  vocabExtra.forEach(v => allVocab.push(v));
  
  // deduplicate
  const seen = new Set();
  const uniq = allVocab.filter(v=>{ if(seen.has(v.w)) return false; seen.add(v.w); return true; });
  
  document.getElementById('vocab-list').innerHTML = uniq.map(v=>`
    <div class="vocab-card">
      <div class="vocab-word">${v.w}</div>
      <div class="vocab-reading">${v.r}</div>
      <div class="vocab-meaning">${v.m}</div>
      <span class="vocab-kanji-tag">${v.k}</span>
    </div>`).join('');
}

// ─── KUIS ────────────────────────────────────────────────────────────
let quizQuestions = [], quizIndex = 0, quizScore = 0;

function buildQuiz() {
  const pool = [...kanjiData].sort(()=>Math.random()-0.5).slice(0,15);
  quizQuestions = pool.map(k => {
    const type = Math.random() > 0.5 ? 'meaning' : 'reading';
    // wrong options
    const wrongs = kanjiData.filter(x=>x.char!==k.char)
      .sort(()=>Math.random()-0.5).slice(0,3)
      .map(x => type==='meaning' ? x.meaning : x.on);
    const correct = type==='meaning' ? k.meaning : k.on;
    const opts = [...wrongs, correct].sort(()=>Math.random()-0.5);
    return { k, type, correct, opts };
  });
  quizIndex = 0; quizScore = 0;
  renderQuiz();
}

function renderQuiz() {
  const area = document.getElementById('quiz-area');
  if (quizIndex >= quizQuestions.length) {
    const pct = Math.round(quizScore/quizQuestions.length*100);
    const emoji = pct>=80?'🎉':pct>=60?'😊':'💪';
    area.innerHTML = `<div class="quiz-done show">
      <div class="quiz-done-score">${quizScore}/${quizQuestions.length}</div>
      <h3>${emoji} ${pct>=80?'Luar Biasa!':pct>=60?'Bagus!':'Terus Berlatih!'}</h3>
      <p>Skor kamu: <strong style="color:var(--gold)">${pct}%</strong> — ${pct>=80?'Kamu siap ke level berikutnya!':pct>=60?'Hampir sempurna, latih lagi!':'Jangan menyerah, ulangi belajar!'}</p>
      <button class="btn-restart" onclick="buildQuiz()">🔄 Coba Lagi</button>
    </div>`;
    return;
  }
  
  const q = quizQuestions[quizIndex];
  const pct = (quizIndex/quizQuestions.length*100).toFixed(0);
  
  area.innerHTML = `
    <div class="quiz-header">
      <span class="quiz-progress">Soal ${quizIndex+1} dari ${quizQuestions.length}</span>
      <span class="quiz-score">✅ ${quizScore} benar</span>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="quiz-card">
      <div class="quiz-question-kanji">${q.k.char}</div>
      <div class="quiz-question-type">${q.type==='meaning'?'Apa arti kanji ini?':'Bagaimana cara bacanya?'}</div>
    </div>
    <div class="quiz-options">
      ${q.opts.map(opt=>`<button class="quiz-option" onclick="answerQuiz(this,'${opt.replace(/'/g,"\\'")}','${q.correct.replace(/'/g,"\\'")}')">
        ${opt}
      </button>`).join('')}
    </div>
    <div class="quiz-feedback" id="qfeedback"></div>
    <button class="btn-next" id="btn-next" onclick="nextQuiz()">Lanjut →</button>
  `;
}

function answerQuiz(btn, ans, correct) {
  document.querySelectorAll('.quiz-option').forEach(b=>b.disabled=true);
  const fb = document.getElementById('qfeedback');
  if (ans === correct) {
    btn.classList.add('correct');
    quizScore++;
    fb.className='quiz-feedback show ok'; fb.textContent='✅ Benar! Bagus sekali!';
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.quiz-option').forEach(b=>{ if(b.textContent.trim()===correct) b.classList.add('correct'); });
    fb.className='quiz-feedback show fail'; fb.textContent=`❌ Salah. Jawaban benar: ${correct}`;
  }
  document.getElementById('btn-next').classList.add('show');
}

function nextQuiz() { quizIndex++; renderQuiz(); }

// ─── TABS ────────────────────────────────────────────────────────────
function showTab(id) {
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  event.currentTarget.classList.add('active');
  
  if (id==='kuis') buildQuiz();
  if (id==='penulisan') { renderStrokeSection(); setTimeout(initCanvasSafe,100); }
}

let canvasInited = false;
function initCanvasSafe() { if(!canvasInited){ initCanvas(); canvasInited=true; } }

// ─── INIT ────────────────────────────────────────────────────────────
renderKanjiList();
renderVocab();
</script>
